{% extends "backoffice/base.html" %}
{% block title %}{{ title }} | Gestion{% endblock %}

{% block content %}
<h1 style="margin:0 0 10px">{{ title }}</h1>

<div class="card">
  <form method="post" class="form">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit"><i class="bi bi-check2-circle"></i> Enregistrer</button>
    <a class="btn btn-outline" href="{% url 'bo_users_list' %}">Retour</a>
  </form>
</div>
{% endblock %}
